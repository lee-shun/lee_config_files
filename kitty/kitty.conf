# ===== 字体设置 =====
font_family      Maple Mono SC NF Light
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# 可选的字体特性（Maple Mono 支持连字、花体等）
font_features Maple-Mono-SC-NF-Light +liga +calt +ss01

# ===== 窗口留白与光标 =====
window_padding_width 8

cursor_shape block
cursor_blink_interval 0.5

# ===== 标签栏（多彩 Powerline 风格） =====
tab_bar_style powerline
tab_bar_edge bottom
tab_title_template "{index}: {title}"
active_tab_foreground   #282a36
active_tab_background   #bd93f9
inactive_tab_foreground #6272a4
inactive_tab_background #21222c

# ===== 滚动与性能 =====
scrollback_lines 10000
wheel_scroll_multiplier 5.0
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ===== 鼠标与选择 =====
mouse_hide_wait 3.0
copy_on_select yes
strip_trailing_spaces smart

# ===== Dracula 配色（色彩丰富版） =====
# 前景 / 背景 / 光标
foreground        #f8f8f2
background        #282a36
cursor            #f8f8f2
cursor_text_color #282a36

# 常规色
color0  #21222c  # 黑
color1  #ff5555  # 红
color2  #50fa7b  # 绿
color3  #f1fa8c  # 黄
color4  #bd93f9  # 紫
color5  #ff79c6  # 粉
color6  #8be9fd  # 青
color7  #f8f8f2  # 白

# 亮色
color8  #6272a4  # 亮黑
color9  #ff6e6e  # 亮红
color10 #69ff94  # 亮绿
color11 #ffffa5  # 亮黄
color12 #d6acff  # 亮紫
color13 #ff92df  # 亮粉
color14 #a4ffff  # 亮青
color15 #ffffff  # 亮白

# 界面颜色：选区、边框、提示
selection_foreground #282a36
selection_background #f1fa8c      # 用明黄突出选中文本
url_color            #8be9fd      # 链接使用青色

active_border_color   #bd93f9     # 活跃窗口边框紫色
inactive_border_color #6272a4
bell_border_color     #ff5555

# 可视标记（Hints）
mark1_foreground #282a36
mark1_background #50fa7b
mark2_foreground #282a36
mark2_background #ff79c6
mark3_foreground #282a36
mark3_background #8be9fd

# 覆盖一些语法高亮颜色（需要 terminal 支持 256 色）
# 这里直接使用标准 Dracula 16 色，大部分 CLI 工具会自动适配
